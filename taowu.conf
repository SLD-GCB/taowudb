# taowuDB configuration file
# Generated automatically. Edit with caution.

[firewall]
# 访问控制默认策略：allow=白名单模式, deny=黑名单模式
firewall_access_default = ALLOW

# 启用第三层：MAC 强制访问控制（Bell-LaPadula + Biba）
firewall_access_enabled = OFF

# 启用第五层：多通道告警（邮件/Syslog/Webhook/SNMP）
firewall_alert_enabled = OFF

# 风险评分告警阈值（>= 此值记录告警）
firewall_alert_threshold = 40

# 启用第四层：防篡改审计日志（SM3 哈希链 + SM2 签名）
firewall_audit_enabled = OFF

# 风险评分阻断阈值（>= 此值阻断 SQL）
firewall_block_threshold = 70

# 启用国密密码引擎（SM2/SM3/SM4）
firewall_crypto_enabled = OFF

# 玄武防火墙数据目录（白名单/规则/密钥持久化）
firewall_data_dir = xuanwu_firewall/data

# 启用第二层：主动防御（八台联防/骑兵/蜜罐/陷阱/反制/溯源）
firewall_defense_enabled = OFF

# 启用第一层：SQL 注入检测引擎
firewall_detection_enabled = ON

# 启用玄武防火墙（总开关）
firewall_enabled = ON

# 防火墙工作模式：detect=仅检测, protect=检测+阻断, learn=学习
firewall_mode = DETECT

# 加载的检测规则集
firewall_rules = ALL

# 启用 SQL 指纹白名单快速通道
firewall_whitelist_enabled = ON

[logging]
# 错误日志详细程度（1=简洁, 2=标准, 3=详细）
log_error_verbosity = 2

# 服务器日志级别
log_level = INFO

# 记录所有 SQL 查询到日志
log_queries = OFF

# 慢查询阈值（秒），0 = 关闭
slow_query_threshold = 2.0

[monitoring]
# 启用性能指标收集
metrics_enabled = ON

# 指标收集间隔（秒）
metrics_interval = 10

# 指标数据保留时间（小时）
metrics_retention_hours = 24

[network]
# 启用协议层压缩（zlib）
compress_protocol = OFF

# 最大网络数据包大小
max_packet_size = 16777216

# 网络缓冲区大小（读/写）
net_buffer_length = 16384

# 网络读取超时时间（秒）
net_read_timeout = 30

# 网络写入超时时间（秒）
net_write_timeout = 60

[replication]
# 启用复制功能
replication_enabled = OFF

# 主服务器地址（从库配置）
replication_master_host = 

# 主服务器端口（从库配置）
replication_master_port = 3307

# 复制角色
replication_role = STANDALONE

[security]
# 认证插件
auth_plugin = NATIVE

# 登录失败最大尝试次数
max_login_attempts = 5

# 密码过期天数（0 = 永不过期）
password_expire_days = 0

# SSL 证书文件路径
ssl_cert_path = 

# 启用 SSL/TLS 加密连接
ssl_enabled = OFF

# SSL 私钥文件路径
ssl_key_path = 

[server]
# 连接超时时间（秒）
connection_timeout = 10

# 数据文件存放路径
datadir = taowu_data

# 服务器监听的 IP 地址
host = 127.0.0.1

# 最大并发客户端连接数
max_connections = 151

# 服务器监听的 TCP 端口
port = 3306

# 服务器唯一 ID（用于复制拓扑）
server_id = 1

# 查询执行的工作线程数
worker_threads = 4

[sql]
# 每条语句自动提交
autocommit = ON

# 新建数据库的默认字符集
default_charset = utf8mb3

# 单个 SQL 语句的最大大小
max_allowed_packet = 16777216

# 查询缓存大小（0 = 禁用）
query_cache_size = 0

# SQL 模式（严格程度）
sql_mode = STRICT

[storage]
# 数据文件自动扩展增量
autoextend_increment = 67108864

# 缓冲池页数（每页 4KB）
buffer_pool_size = 10000

# 缓存索引页到缓冲池
cache_index_pages = ON

# 自动检查点间隔（秒）
checkpoint_interval = 60

# 数据文件段自动扩展前的大小
data_segment_size = 268435456

# 提交后强制 fsync（ACID 持久性）
fsync_on_commit = ON

# 页面大小（字节，必须是 2 的幂）
page_size = 4096

# WAL 段文件大小
wal_segment_size = 67108864

[transaction]
# 死锁检测间隔（秒）
deadlock_detect_interval = 5

# 默认事务隔离级别
isolation_level = REPEATABLE_READ

# 锁等待超时时间（秒）
lock_wait_timeout = 50

# 事务最大执行时间（秒）
max_trx_time = 3600
